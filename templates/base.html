<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BollyBeat Lounge | AI Music Discovery Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-global: #1a1114;
            --bg-global-2: #20141a;
            --bg-card: #2a1a21;
            --bg-card-raised: #33202a;
            --border-soft: rgba(214, 175, 117, 0.16);
            --border-strong: rgba(214, 175, 117, 0.32);
            --brand-gold: #d3a35a;
            --brand-gold-bright: #ecc888;
            --brand-rose: #c1666b;
            --brand-emerald: #5c8672;
            --text-main: #f4e8da;
            --text-secondary: #cab8ab;
            --text-muted: #8c7669;
            --shadow-deep: 0 20px 50px -20px rgba(0, 0, 0, 0.55);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-global);
            background-image:
                radial-gradient(ellipse 900px 500px at 15% -10%, rgba(211, 163, 90, 0.10), transparent 60%),
                radial-gradient(ellipse 700px 500px at 100% 10%, rgba(193, 102, 107, 0.08), transparent 60%);
            background-attachment: fixed;
            color: var(--text-secondary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 { font-family: 'Fraunces', serif; color: var(--text-main); font-weight: 600; }

        a { color: inherit; }

        ::selection { background: var(--brand-gold); color: #1a1114; }

        /* ---------- Navbar ---------- */
        .navbar {
            background-color: rgba(26, 17, 20, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border-soft);
            padding: 18px 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 21px;
            letter-spacing: 0.01em;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .nav-logo .logo-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--brand-gold);
            box-shadow: 0 0 10px 2px rgba(211, 163, 90, 0.55);
            display: inline-block;
        }

        .nav-logo span { color: var(--brand-gold); font-style: italic; font-weight: 500; }

        .nav-links { display: flex; gap: 30px; }

        .nav-link {
            position: relative;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13.5px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            padding-bottom: 4px;
            transition: color 0.25s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            width: 0;
            height: 1px;
            background: var(--brand-gold);
            transition: width 0.28s ease, left 0.28s ease;
        }

        .nav-link:hover { color: var(--brand-gold-bright); }
        .nav-link:hover::after { width: 100%; left: 0; }

        @media (max-width: 640px) {
            .navbar { padding: 16px 20px; }
            .nav-links { gap: 16px; }
            .nav-link { font-size: 11.5px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo"><span class="logo-dot"></span>BollyBeat <span>Lounge</span></a>
        <div class="nav-links">
            <a href="/" class="nav-link">Discover</a>
            <a href="/features" class="nav-link">Features</a>
            <a href="/about" class="nav-link">About</a>
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
